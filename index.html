<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Habit Tracker</title>
    <meta
      name="description"
      content="A calm, offline-friendly habit tracker for daily routines, streaks, and momentum."
    />
    <meta name="theme-color" content="#081428" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-row">
          <span class="topbar-time" id="phoneTime">9:31</span>
          <h1>My Habits</h1>
          <button class="icon-button" type="button" aria-label="Notifications">◌</button>
        </div>

        <div class="topbar-date" id="todayDate"></div>

        <section class="brand-hero" aria-label="Brand icon">
          <img
            class="brand-hero-image"
            src="./tiger-icon.jpg.png"
            alt="Tiger walking forward"
          />
        </section>

        <section class="week-summary">
          <div class="week-strip" id="weekStrip" aria-label="Last seven days"></div>
        </section>
      </header>

      <main class="content">
        <section class="panel quote-panel">
          <div class="quote-hero">
            <div class="quote-hero-copy">
              <p class="eyebrow">Quote of the day</p>
              <h2 id="quoteCategoryTitle">Discipline</h2>
              <p class="quote-text" id="featuredQuote"></p>
            </div>
            <button class="ghost-button quote-button" id="nextQuoteButton" type="button">
              Next quote
            </button>
          </div>

          <div class="quote-rail" id="quoteRail" aria-label="Quote categories"></div>
        </section>

        <section class="panel progress-panel">
          <div class="section-title">
            <span></span>
            <h2>Today's Progress</h2>
            <span></span>
          </div>

          <div class="progress-ring-card">
            <div class="progress-ring" id="progressRing">
              <div class="progress-ring-inner">
                <strong id="completionRate">0%</strong>
              </div>
            </div>
            <p class="progress-caption" id="heroProgressText">0 / 0 habits completed</p>
          </div>
        </section>

        <section class="panel quick-panel">
          <div class="quick-grid">
            <article class="quick-stat">
              <span class="quick-label">Best streak</span>
              <strong id="bestStreak">0</strong>
            </article>
            <article class="quick-stat">
              <span class="quick-label">Consistency</span>
              <strong id="consistencyScore">0</strong>
            </article>
            <article class="quick-stat focus-stat">
              <span class="quick-label">Focus</span>
              <strong id="focusHabit">Start small</strong>
            </article>
          </div>
        </section>

        <section class="panel minutes-panel">
          <div class="minutes-stat">
            <span class="minutes-label">Planned minutes</span>
            <strong id="plannedMinutes">0</strong>
          </div>
          <div class="minutes-stat">
            <span class="minutes-label">Completed minutes</span>
            <strong id="completedMinutes">0</strong>
          </div>
        </section>

        <section class="panel add-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Add habit</p>
              <h2>Create today's systems</h2>
            </div>
            <button id="resetTodayButton" class="ghost-button" type="button">Reset today</button>
          </div>

          <form id="habitForm" class="habit-form">
            <input
              id="habitName"
              name="habitName"
              type="text"
              maxlength="40"
              placeholder="Drink water"
              required
            />

            <div class="form-row">
              <input
                id="habitMinutes"
                name="habitMinutes"
                type="number"
                min="1"
                max="600"
                step="1"
                inputmode="numeric"
                placeholder="Minutes"
                required
              />
              <select id="habitCategory" name="habitCategory">
                <option value="Health">Health</option>
                <option value="Focus">Focus</option>
                <option value="Fitness">Fitness</option>
                <option value="Learning">Learning</option>
                <option value="Home">Home</option>
                <option value="Mindset">Mindset</option>
              </select>

              <div class="color-picker" id="colorPicker">
                <button type="button" class="color-swatch active" data-color="#25a9e0" aria-label="Sky"></button>
                <button type="button" class="color-swatch" data-color="#33c759" aria-label="Green"></button>
                <button type="button" class="color-swatch" data-color="#ff7a1a" aria-label="Orange"></button>
                <button type="button" class="color-swatch" data-color="#8b5cf6" aria-label="Purple"></button>
                <button type="button" class="color-swatch" data-color="#2f6fcb" aria-label="Blue"></button>
              </div>
            </div>

            <button class="primary-button" type="submit">Add habit</button>
          </form>
        </section>

        <section class="habit-stack" id="habitList" aria-live="polite"></section>

        <section id="emptyState" class="panel empty-state">
          <p>No habits yet.</p>
          <span>Add your first habit to build your daily rhythm.</span>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="App navigation">
        <button class="nav-item is-active" type="button">Home</button>
        <button class="nav-item" type="button">Stats</button>
        <button class="nav-add" type="button">+</button>
        <button class="nav-item" type="button">Insights</button>
        <button class="nav-item" type="button">Profile</button>
      </nav>
    </div>

    <template id="habitTemplate">
      <article class="habit-card">
        <div class="habit-header">
          <div class="habit-title-wrap">
            <span class="habit-icon"></span>
            <div class="habit-copy">
              <h3 class="habit-title"></h3>
              <p class="habit-meta"></p>
            </div>
          </div>
          <div class="habit-side">
            <span class="habit-score"></span>
            <button class="delete-button" type="button" aria-label="Delete habit">Remove</button>
          </div>
        </div>

        <div class="habit-controls">
          <label class="habit-check-row">
            <input class="habit-check" type="checkbox" />
            <span>Done today</span>
          </label>
          <span class="habit-minutes"></span>
        </div>

        <div class="habit-days"></div>

        <button class="habit-toggle" type="button">Mark today done</button>
      </article>
    </template>

    <script src="./app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
